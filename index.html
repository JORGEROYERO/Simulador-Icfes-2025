function BarVentas() {
  const meses = [
    { m: "Enero", v: [5500, 9000, 4000, 4000] },
    { m: "Febrero", v: [5000, 7000, 6500, 5000] },
    { m: "Marzo", v: [5000, 8500, 7500, 5500] },
    { m: "Abril", v: [5000, 7000, 6000, 6000] },
  ];
  const colors = ["#cbd5e1", "#0f172a", "#ffffff", "#475569"];
  const labels = ["Agua", "Gaseosa", "Cerveza", "Jugos"];
  const max = 10000;
  return (
    <svg viewBox="0 0 360 230" width="100%" style={{ maxWidth: 420 }}>
      {[0, 2500, 5000, 7500, 10000].map((g) => {
        const y = 180 - (g / max) * 160;
        return (
          <g key={g}>
            <line x1="34" y1={y} x2="350" y2={y} stroke="#e2e8f0" />
            <text x="30" y={y + 3} fontSize="7" textAnchor="end" fill="#64748b">{g / 1000}.000</text>
          </g>
        );
      })}
      {meses.map((mo, i) => {
        const groupX = 44 + i * 78;
        return (
          <g key={mo.m}>
            {mo.v.map((val, j) => {
              const h = (val / max) * 160;
              return (
                <rect key={j} x={groupX + j * 15} y={180 - h} width="13" height={h}
                  fill={colors[j]} stroke="#0f172a" strokeWidth="0.6" />
              );
            })}
            <text x={groupX + 30} y="192" fontSize="8" textAnchor="middle" fill="#334155">{mo.m}</text>
          </g>
        );
      })}
      {labels.map((l, i) => (
        <g key={l}>
          <rect x={44 + i * 80} y="205" width="9" height="9" fill={colors[i]} stroke="#0f172a" strokeWidth="0.6" />
          <text x={56 + i * 80} y="213" fontSize="8" fill="#334155">{l}</text>
        </g>
      ))}
    </svg>
  );
}

function BarPacientes({ data, label }) {

          </g>
        );

      {data.map((v, i) => {
        const h = (v / max) * 120;
        const x = 34 + i * 40;

}

      "x1: 0,20 — x3: 0,16 — x4: 0,25",
    ], correcta: 2 },
  { n: 19, enunciado: "Tras lanzar un producto en agosto, el gerente afirmó que los ingresos aumentaron de forma creciente en los 3 meses siguientes y presentó la gráfica. ¿Por qué la gráfica es inconsistente con su afirmación?",
    figura: <BarIngresos />,
    opciones: [
      "Porque el orden de los meses debería ser noviembre, septiembre, octubre y agosto.",
      "Porque en octubre se indican ingresos menores al mes inmediatamente anterior.",
      "Porque los ingresos de septiembre deberían ser menores que los de agosto y octubre.",
      "Porque debió incluirse julio para comparar con los ingresos previos.",
    ], correcta: 1 },
  { n: 20, enunciado: "Una institución ofrece 4 módulos. El valor por grupo es: I $1.400.000, II $900.000, III $1.600.000, IV $450.000. Cada módulo se hace con cursos de mínimo 20 y máximo 30 personas. Si se pagó cada módulo para 30 trabajadores, el módulo que más le costó a la empresa fue:",
    opciones: ["I.", "II.", "III.", "IV."], correcta: 2 },
  { n: 21, enunciado: "Por cada moneda que Miguel introduce en su alcancía en un día, al siguiente introduce el doble. El viernes insertó 512 monedas. ¿Cuántas introdujo el miércoles de esa misma semana?",
    opciones: ["32.", "64.", "128.", "508."], correcta: 2 },
  { n: 22, enunciado: "En un campeonato un equipo necesita 25 puntos para clasificar. En la ronda actual cada equipo juega 10 partidos: 3 puntos por ganar, 1 por empatar y 0 por perder. ¿Cuál pregunta se puede responder con la información dada?",
    opciones: [
      "¿Cuál es el mínimo de partidos que se deben ganar para clasificar?",
      "¿Cuántos partidos deben perder los contrincantes para que el equipo clasifique?",
      "¿Cuál es el total de partidos que se juega en todo el torneo?",
      "¿Cuántos equipos clasifican a la ronda?",
    ], correcta: 0 },
  { n: 23, enunciado: "En un concierto, el 50% de los asistentes se retiró después de una hora, el 30% del total después de dos horas, y los 100 restantes se quedaron hasta el final. ¿Cuántos asistentes había al comienzo?",
    opciones: ["500.", "400.", "330.", "180."], correcta: 0 },
  { n: 24, enunciado: "El triángulo de las Bermudas se forma entre Miami, Bermuda y San Juan, con las distancias de la figura. Si una milla son 1,6 kilómetros, ¿cuál es la distancia en kilómetros entre Miami y Bermuda?",
    figura: <Bermudas />, opciones: ["625 km.", "646,9 km.", "1.036,6 km.", "1.656 km."], correcta: 3 },
  { n: 25, enunciado: "Se necesita encontrar el área del triángulo sombreado. ¿Cuál es el área del triángulo?",
    figura: <TrianguloSemi />, opciones: ["15 m²", "12 m²", "6 m²", "5π m²"], correcta: 2 },
];

// ---------- App ----------

function App() {
  const [fase, setFase] = useState("registro");
  const [nombre, setNombre] = useState("");
  const [curso, setCurso] = useState("");
  const [idx, setIdx] = useState(0);
  const [respuestas, setRespuestas] = useState(Array(PREGUNTAS.length).fill(null));
  const [enviado, setEnviado] = useState(false);

  const total = PREGUNTAS.length;
  const contestadas = respuestas.filter((r) => r !== null).length;

  const resultado = useMemo(() => {
    let correctas = 0;
    respuestas.forEach((r, i) => { if (r === PREGUNTAS[i].correcta) correctas++; });
    return { correctas, pct: Math.round((correctas / total) * 100), incorrectas: total - correctas };
  }, [respuestas, total]);

  const elegir = (op) => {
    const nuevo = [...respuestas];
    nuevo[idx] = op;
    setRespuestas(nuevo);
  };

  const iniciar = () => { if (nombre.trim() && curso.trim()) setFase("examen"); };

  const enviarSheets = () => {
    let url =
      SCRIPT_URL +
      "?asignatura=" + encodeURIComponent("Simulacro ICFES 2025") +
      "&nombre=" + encodeURIComponent(nombre) +
      "&curso=" + encodeURIComponent(curso) +
      "&puntaje=" + resultado.correctas +
      "&total=" + total +
      "&porcentaje=" + resultado.pct +
      "&fecha=" + encodeURIComponent(new Date().toLocaleString("es-CO"));
    PREGUNTAS.forEach((q, i) => {
      const r = respuestas[i];
      const marca = r === null ? "-" : r === q.correcta ? "✓" : "✗";
      url += "&p" + (i + 1) + "=" + encodeURIComponent(marca);
    });
    // Envío por GET abriendo la URL del Apps Script en una pestaña.
    window.open(url, "_blank");
    setEnviado(true);
  };

  const finalizar = () => {
    setFase("resultados");
    if (!enviado) enviarSheets();
  };

  const p = PREGUNTAS[idx];
  const ff = "'Segoe UI', system-ui, -apple-system, sans-serif";

  // ---- Registro ----
  if (fase === "registro") {
    const listo = nombre.trim() && curso.trim();
    return (
      <div style={{ ...wrap, fontFamily: ff }}>
        <div style={{ ...card, maxWidth: 460, margin: "0 auto", padding: 0, overflow: "hidden" }}>
          <div style={{ background: C.ink, color: "#fff", padding: "28px 30px" }}>
            <div style={{ fontSize: 12, letterSpacing: 3, color: C.amber, fontWeight: 700 }}>SIMULACRO · SABER 11</div>
            <h1 style={{ margin: "6px 0 2px", fontSize: 30, fontWeight: 800, lineHeight: 1.1 }}>ICFES 2025</h1>
            <div style={{ fontSize: 14, opacity: 0.85 }}>Matemáticas · 25 preguntas</div>
            <div style={{ fontSize: 11.5, opacity: 0.6, marginTop: 14 }}>I.E. Técnica Agropecuaria de Luruaco</div>
          </div>
          <div style={{ padding: 30 }}>
            <label style={lbl}>Nombre del estudiante</label>
            <input style={inp} value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Nombres y apellidos" />
            <label style={lbl}>Curso</label>
            <input style={inp} value={curso} onChange={(e) => setCurso(e.target.value)} placeholder="Ej: 11-A" />
            <button onClick={iniciar} disabled={!listo}
              style={{ ...btn, width: "100%", marginTop: 22, opacity: listo ? 1 : 0.45, cursor: listo ? "pointer" : "not-allowed" }}>
              Comenzar simulacro
            </button>
            <p style={{ fontSize: 12, color: C.muted, marginTop: 16, lineHeight: 1.5 }}>
              Responde las 25 preguntas. Puedes navegar entre ellas y cambiar tus respuestas antes de finalizar.
            </p>
          </div>
        </div>
      </div>
    );
  }

  // ---- Resultados ----
  if (fase === "resultados") {
    const r = resultado.pct;
    const radio = 70;
    const circ = 2 * Math.PI * radio;
    const color = r >= 70 ? C.good : r >= 40 ? C.amber : C.bad;
    return (
      <div style={{ ...wrap, fontFamily: ff }}>
        <div style={{ ...card, maxWidth: 720, margin: "0 auto" }}>
          <div style={{ textAlign: "center", paddingBottom: 8 }}>
            <div style={{ fontSize: 12, letterSpacing: 2, color: C.amber, fontWeight: 700 }}>RESULTADOS</div>
            <h2 style={{ margin: "4px 0 0", color: C.ink, fontSize: 22 }}>{nombre}</h2>
            <div style={{ color: C.muted, fontSize: 13 }}>Curso {curso}</div>
          </div>

          <div style={{ display: "flex", justifyContent: "center", margin: "10px 0 4px" }}>
            <svg width="180" height="180" viewBox="0 0 180 180">
              <circle cx="90" cy="90" r={radio} fill="none" stroke={C.line} strokeWidth="16" />
              <circle cx="90" cy="90" r={radio} fill="none" stroke={color} strokeWidth="16" strokeLinecap="round"
                strokeDasharray={circ} strokeDashoffset={circ - (r / 100) * circ} transform="rotate(-90 90 90)" />
              <text x="90" y="86" textAnchor="middle" fontSize="40" fontWeight="800" fill={C.ink}>{r}%</text>
              <text x="90" y="110" textAnchor="middle" fontSize="13" fill={C.muted}>{resultado.correctas} / {total}</text>
            </svg>
          </div>

          <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 18 }}>
            <Pill label="Correctas" value={resultado.correctas} color={C.good} />
            <Pill label="Incorrectas" value={resultado.incorrectas} color={C.bad} />
          </div>

          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <button onClick={enviarSheets} style={{ ...btn }}>
              {enviado ? "Registrar de nuevo" : "Registrar resultado en Google Sheets"}
            </button>
            <button onClick={() => { setFase("examen"); setIdx(0); }} style={{ ...btnGhost }}>Revisar respuestas</button>
          </div>
          {enviado && (
            <p style={{ textAlign: "center", color: C.good, fontSize: 12.5, marginTop: 12 }}>
              El resultado se envió a Google Sheets (se abrió una pestaña). Si no aparece en la hoja, verifica que
              SCRIPT_URL sea la URL de implementación de la aplicación web, la que termina en /exec.
            </p>
          )}

          <hr style={{ border: "none", borderTop: `1px solid ${C.line}`, margin: "22px 0 6px" }} />
          <h3 style={{ color: C.ink, fontSize: 16, margin: "8px 0 12px" }}>Revisión</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {PREGUNTAS.map((q, i) => {
              const ok = respuestas[i] === q.correcta;
              const sin = respuestas[i] === null;
              return (
                <button key={i} onClick={() => { setFase("examen"); setIdx(i); }} title={`Pregunta ${q.n}`}
                  style={{ width: 38, height: 38, borderRadius: 9, border: "none", cursor: "pointer",
                    fontWeight: 700, color: "#fff", background: sin ? C.muted : ok ? C.good : C.bad }}>
                  {q.n}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ---- Examen ----
  const seleccion = respuestas[idx];
  const revisando = contestadas === total || enviado;
  return (
    <div style={{ ...wrap, fontFamily: ff }}>
      <div style={{ ...card, maxWidth: 760, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <div style={{ fontWeight: 800, color: C.ink, fontSize: 15 }}>Simulacro ICFES 2025 · Matemáticas</div>
          <div style={{ fontSize: 13, color: C.muted }}>{idx + 1} <span style={{ opacity: 0.6 }}>/ {total}</span></div>
        </div>
        <div style={{ height: 8, background: C.line, borderRadius: 99, margin: "10px 0 4px" }}>
          <div style={{ width: `${((idx + 1) / total) * 100}%`, height: "100%", background: C.amber, borderRadius: 99, transition: "width .25s" }} />
        </div>
        <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 18 }}>{contestadas} de {total} respondidas</div>

        <div style={{ display: "flex", gap: 10, marginBottom: 6 }}>
          <span style={{ background: C.ink, color: "#fff", borderRadius: 8, padding: "3px 10px", fontWeight: 700, fontSize: 13, height: "fit-content" }}>{p.n}</span>
          <p style={{ margin: 0, color: C.inkSoft, fontSize: 15.5, lineHeight: 1.55 }}>{p.enunciado}</p>
        </div>

        {p.figura && (
          <div style={{ margin: "14px 0", padding: 12, background: C.paper, borderRadius: 12, display: "flex", justifyContent: "center" }}>
            {p.figura}
          </div>
        )}

        <div style={{ display: "grid", gap: 10, marginTop: 12 }}>
          {p.opciones.map((op, i) => {
            const letra = ["A", "B", "C", "D"][i];
            const elegida = seleccion === i;
            const esCorrecta = i === p.correcta;
            let bg = C.card, bd = C.line;
            if (revisando) {
              if (esCorrecta) { bg = "#eaf6ef"; bd = C.good; }
              else if (elegida) { bg = "#fbece9"; bd = C.bad; }
            } else if (elegida) { bg = "#fdf2e3"; bd = C.amber; }
            return (
              <button key={i} onClick={() => !revisando && elegir(i)}
                style={{ textAlign: "left", display: "flex", gap: 12, alignItems: "flex-start", padding: "12px 14px",
                  borderRadius: 12, border: `2px solid ${bd}`, background: bg, cursor: revisando ? "default" : "pointer",
                  fontSize: 14.5, color: C.inkSoft }}>
                <span style={{ fontWeight: 800, color: elegida || (revisando && esCorrecta) ? C.ink : C.muted, minWidth: 16 }}>{letra}</span>
                <span style={{ flex: 1 }}>{p.figurasOpciones ? <span style={{ display: "block" }}>{p.figurasOpciones[i]}</span> : op}</span>
                {revisando && esCorrecta && <span style={{ color: C.good, fontWeight: 800 }}>✓</span>}
                {revisando && elegida && !esCorrecta && <span style={{ color: C.bad, fontWeight: 800 }}>✗</span>}
              </button>
            );
          })}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 24, gap: 10 }}>
          <button onClick={() => setIdx((v) => Math.max(0, v - 1))} disabled={idx === 0} style={{ ...btnGhost, opacity: idx === 0 ? 0.4 : 1 }}>← Anterior</button>
          {idx < total - 1 ? (
            <button onClick={() => setIdx((v) => Math.min(total - 1, v + 1))} style={{ ...btn }}>Siguiente →</button>
          ) : (
            <button onClick={finalizar} style={{ ...btn, background: C.good }}>Finalizar y ver resultados</button>
          )}
        </div>

        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 20 }}>
          {PREGUNTAS.map((q, i) => (
            <button key={i} onClick={() => setIdx(i)}
              style={{ width: 30, height: 30, borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: "pointer",
                border: i === idx ? `2px solid ${C.ink}` : `1px solid ${C.line}`,
                background: respuestas[i] !== null ? C.amber : C.card,
                color: respuestas[i] !== null ? "#fff" : C.muted }}>
              {q.n}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Pill({ label, value, color }) {
  return (
    <div style={{ background: "#fff", border: `1px solid ${C.line}`, borderRadius: 12, padding: "10px 18px", textAlign: "center", minWidth: 92 }}>
      <div style={{ fontSize: 24, fontWeight: 800, color }}>{value}</div>
      <div style={{ fontSize: 11.5, color: C.muted }}>{label}</div>
    </div>
  );
}

const wrap = { minHeight: "100vh", background: C.paper, padding: "28px 16px", boxSizing: "border-box" };
const card = { background: C.card, borderRadius: 18, padding: 26, boxShadow: "0 8px 30px rgba(15,42,63,.08)", border: `1px solid ${C.line}` };
const lbl = { display: "block", fontSize: 12.5, fontWeight: 700, color: C.ink, margin: "14px 0 6px" };
const inp = { width: "100%", padding: "11px 13px", borderRadius: 10, border: `1.5px solid ${C.line}`, fontSize: 15, boxSizing: "border-box", outline: "none" };
const btn = { background: C.ink, color: "#fff", border: "none", borderRadius: 10, padding: "11px 20px", fontSize: 14.5, fontWeight: 700, cursor: "pointer" };
const btnGhost = { background: "#fff", color: C.ink, border: `1.5px solid ${C.line}`, borderRadius: 10, padding: "11px 20px", fontSize: 14.5, fontWeight: 700, cursor: "pointer" };

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
